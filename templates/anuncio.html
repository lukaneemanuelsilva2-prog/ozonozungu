<!DOCTYPE html>
<html lang="pt">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{{ anuncio.titulo }} - OzonoZungu</title>
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-gray-950 text-white min-h-screen">

    <!-- NAVBAR -->
    <nav class="bg-gray-900 px-6 py-4 flex justify-between items-center border-b border-orange-500">
        <a href="/" class="text-orange-500 text-2xl font-bold">OzonoZungu</a>
        <div class="flex gap-4">
            <a href="/" class="text-gray-300 hover:text-orange-500">Anúncios</a>
            <a href="/publicar" class="bg-orange-500 px-4 py-2 rounded-lg text-black font-semibold hover:bg-orange-400">Publicar</a>
        </div>
    </nav>

    <!-- DETALHE -->
    <div class="max-w-3xl mx-auto py-12 px-6">

        <a href="/" class="text-gray-500 hover:text-orange-500 text-sm mb-6 inline-block">← Voltar aos anúncios</a>

        <div class="bg-gray-900 border border-gray-800 rounded-2xl p-8">

            <div class="flex justify-between items-center mb-4">
                <span class="bg-orange-500 text-black text-sm font-bold px-4 py-1 rounded-full">{{ anuncio.categoria }}</span>
                <span class="text-gray-500 text-sm">{{ anuncio.data.strftime('%d/%m/%Y') }}</span>
            </div>
{% if anuncio.imagem %}
<img src="{{ url_for('static', filename='uploads/' + anuncio.imagem) }}"
    class="w-full h-64 object-cover rounded-xl mb-6">
{% endif %}
            <h1 class="text-3xl font-bold mb-4">{{ anuncio.titulo }}</h1>

            <p class="text-gray-400 text-base leading-relaxed mb-6">{{ anuncio.descricao }}</p>

            <div class="border-t border-gray-800 pt-6 flex justify-between items-center">
                <div>
                    <p class="text-gray-500 text-sm">Preço</p>
                    <p class="text-orange-500 text-2xl font-bold">{{ anuncio.preco }}</p>
                </div>
                <a href="https://wa.me/{{ anuncio.contacto }}" target="_blank"
                    class="bg-orange-500 text-black font-bold px-6 py-3 rounded-xl hover:bg-orange-400 transition">
                    Contactar Vendedor
                </a>
            </div>

        </div>
    </div>

</body>
</html>
